<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Blue Market</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .product-page-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            background: var(--bg-dark);
            padding: 40px;
            border-radius: 24px;
            margin-top: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(102, 252, 241, 0.05);
        }

        .p-image-box {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .p-image-box img {
            width: 100%;
            display: block;
        }

        .p-info-box h1 {
            color: var(--text-white);
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .p-price-large {
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 800;
            margin: 20px 0;
        }

        .trust-badges {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: var(--bg-darker);
            border-radius: 12px;
        }

        .badge-item {
            text-align: center;
            font-size: 0.8rem;
        }

        .stock-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .product-page-grid {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px;
            }

            .p-info-box h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">BLUE MARKET</div>
        <div class="nav-right">
            <button class="nav-btn" onclick="window.location.href='cart.html'">Cart</button>
            <button class="nav-btn" onclick="window.location.href='profile.html'">Account</button>
        </div>
    </nav>

    <div class="container">
        <a href="index.html" class="nav-btn" style="display:inline-flex; text-decoration:none; margin-bottom:20px;">←
            Back to Exchange</a>

        <div id="product-loading" style="text-align: center; padding: 100px;">
            <div class="skeleton" style="height:400px; width:100%; border-radius:24px;"></div>
        </div>

        <div id="product-content" class="product-page-grid" style="display: none;">
            <div class="p-image-box">
                <img id="p-img" src="" alt="Product">
            </div>

            <div class="p-info-box">
                <div id="p-stock-tag" class="stock-indicator"
                    style="background: rgba(102, 252, 241, 0.1); color: var(--primary);">Limited Inventory</div>
                <div id="p-category"
                    style="color: var(--primary-dark); font-weight:700; text-transform:uppercase; font-size:0.9rem;">
                    Category</div>
                <h1 id="p-name">Loading...</h1>

                <div class="rating" id="p-rating">
                    <span id="p-stars"></span>
                    <span id="p-reviews" style="opacity:0.6; font-size:0.9rem;">(0 reviews)</span>
                </div>

                <div class="p-price-large" id="p-price">KSh 0.00</div>

                <p id="p-desc"
                    style="font-size: 1.1rem; line-height: 1.8; margin-bottom:40px; color: var(--text-light);"></p>

                <button id="addBtn" class="btn-add" style="font-size: 1.2rem; padding: 20px;">Secure Purchase</button>

            </div>
        </div>
    </div>

    <script src="product.js"></script>
</body>

</html>
